<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- corps du module laser (ardoise) -->
  <rect x="18" y="8" width="28" height="20" rx="4" fill="#2f3540"/>
  <!-- fente / lentille -->
  <rect x="23" y="13" width="18" height="4" rx="2" fill="#ff8a00"/>
  <!-- nez conique -->
  <polygon points="26,28 38,28 34,38 30,38" fill="#2f3540"/>
  <!-- faisceau -->
  <line x1="32" y1="38" x2="32" y2="50" stroke="#ff8a00" stroke-width="4" stroke-linecap="round"/>
  <!-- éclat d'impact -->
  <g stroke="#ff8a00" stroke-width="2.5" stroke-linecap="round">
    <line x1="32" y1="50" x2="32" y2="56"/>
    <line x1="26" y1="52" x2="24" y2="56"/>
    <line x1="38" y1="52" x2="40" y2="56"/>
  </g>
  <!-- plan de travail -->
  <line x1="10" y1="57" x2="54" y2="57" stroke="#2f3540" stroke-width="3" stroke-linecap="round"/>
</svg>
