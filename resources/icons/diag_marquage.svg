<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 120">
  <!-- Marquage de motif : le trace suit le relief de la surface (plat ou courbe). -->
  <!-- tete laser -->
  <rect x="126" y="12" width="28" height="24" rx="3" fill="#2f3540" opacity="0.15" stroke="#2f3540" stroke-width="2"/>
  <path d="M128 36 L140 50 L152 36 Z" fill="#2f3540"/>
  <line x1="140" y1="50" x2="140" y2="79" stroke="#ff8a00" stroke-width="2" stroke-dasharray="3 3"/>
  <g stroke="#ff8a00" stroke-width="1.4">
    <line x1="140" y1="80" x2="133" y2="74"/><line x1="140" y1="80" x2="147" y2="74"/><line x1="140" y1="80" x2="130" y2="82"/><line x1="140" y1="80" x2="150" y2="82"/>
  </g>
  <!-- surface (relief) -->
  <path d="M18 94 C55 70 95 70 140 88 S225 110 262 88" fill="none" stroke="#2f3540" stroke-width="2.5"/>
  <!-- trace grave, parallele a la surface -->
  <path d="M18 86 C55 62 95 62 140 80 S225 102 262 80" fill="none" stroke="#ff8a00" stroke-width="2.5"/>
  <text x="140" y="113" font-family="sans-serif" font-size="10" fill="#ff8a00" text-anchor="middle">le tracé suit le relief (plat ou courbe)</text>
</svg>
