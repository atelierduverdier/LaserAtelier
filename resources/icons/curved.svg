<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- bec laser (cône) + faisceau -->
  <polygon points="18,4 30,4 24,16" fill="#2f3540"/>
  <line x1="24" y1="16" x2="24" y2="42" stroke="#ff8a00" stroke-width="2.5" stroke-linecap="round"/>
  <!-- éclat au point d'impact -->
  <g stroke="#ff8a00" stroke-width="2" stroke-linecap="round">
    <line x1="20" y1="38" x2="17" y2="35"/>
    <line x1="28" y1="38" x2="31" y2="35"/>
  </g>
  <!-- surface : plate à gauche, courbe à droite -->
  <path d="M4 44 L32 44 Q48 44 58 28" fill="none" stroke="#2f3540" stroke-width="3.5" stroke-linecap="round"/>
  <!-- marquage déjà gravé : hachures sur la surface (suivent la pente) -->
  <g stroke="#ff8a00" stroke-width="2.5" stroke-linecap="round">
    <line x1="7" y1="49" x2="13" y2="49"/>
    <line x1="16" y1="49" x2="22" y2="49"/>
    <line x1="38" y1="47" x2="44" y2="44"/>
    <line x1="47" y1="41" x2="52" y2="36"/>
  </g>
</svg>
