<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 100">
  <!-- grille 3x3 de cellules, remplissage de plus en plus dense vers la droite -->
  <g stroke="#2f3540" stroke-width="1.5" fill="none">
    <rect x="40" y="14" width="20" height="20"/><rect x="66" y="14" width="20" height="20"/><rect x="92" y="14" width="20" height="20"/>
    <rect x="40" y="40" width="20" height="20"/><rect x="66" y="40" width="20" height="20"/><rect x="92" y="40" width="20" height="20"/>
    <rect x="40" y="66" width="20" height="20"/><rect x="66" y="66" width="20" height="20"/><rect x="92" y="66" width="20" height="20"/>
  </g>
  <!-- densité croissante en X (puissance) -->
  <g stroke="#ff8a00" stroke-width="1.2">
    <line x1="43" y1="70" x2="57" y2="84"/>
    <line x1="69" y1="70" x2="83" y2="84"/><line x1="69" y1="78" x2="75" y2="84"/><line x1="75" y1="70" x2="83" y2="78"/>
    <line x1="95" y1="70" x2="109" y2="84"/><line x1="95" y1="76" x2="103" y2="84"/><line x1="101" y1="70" x2="109" y2="78"/><line x1="95" y1="82" x2="97" y2="84"/><line x1="107" y1="70" x2="109" y2="72"/>
  </g>
  <!-- axes -->
  <g stroke="#ff8a00" stroke-width="2" fill="none">
    <line x1="40" y1="94" x2="112" y2="94"/><polyline points="106,90 112,94 106,98"/>
    <line x1="30" y1="86" x2="30" y2="14"/><polyline points="26,20 30,14 34,20"/>
  </g>
  <g font-family="sans-serif" font-size="11" fill="#2f3540">
    <text x="122" y="30">une cellule =</text>
    <text x="122" y="44">un couple S / F</text>
    <text x="122" y="72" fill="#ff8a00">→ puissance S croissante</text>
    <text x="122" y="90" fill="#ff8a00">↑ vitesse F croissante</text>
  </g>
</svg>
