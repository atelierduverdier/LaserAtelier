<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 110">
  <!-- Decoupe a plat (vue de dessus) : contour coupe en orange, attaches = ponts ardoise. -->
  <g stroke="#ff8a00" stroke-width="3" stroke-linecap="round">
    <line x1="40" y1="24" x2="118" y2="24"/><line x1="142" y1="24" x2="210" y2="24"/>
    <line x1="210" y1="24" x2="210" y2="86"/>
    <line x1="210" y1="86" x2="142" y2="86"/><line x1="118" y1="86" x2="40" y2="86"/>
    <line x1="40" y1="86" x2="40" y2="24"/>
  </g>
  <!-- attaches (ponts de matiere non coupes) -->
  <g stroke="#2f3540" stroke-width="3" stroke-linecap="round">
    <line x1="118" y1="24" x2="142" y2="24"/>
    <line x1="118" y1="86" x2="142" y2="86"/>
  </g>
  <text x="130" y="16" font-family="sans-serif" font-size="9" fill="#2f3540" text-anchor="middle">attache</text>
  <text x="125" y="103" font-family="sans-serif" font-size="9.5" fill="#ff8a00" text-anchor="middle">coupe en plusieurs passes</text>
</svg>
