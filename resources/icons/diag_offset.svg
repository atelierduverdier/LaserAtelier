<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 100">
  <!-- croix fraisée (ardoise) -->
  <g stroke="#2f3540" stroke-width="4" stroke-linecap="round">
    <line x1="20" y1="46" x2="76" y2="46"/>
    <line x1="48" y1="18" x2="48" y2="74"/>
  </g>
  <!-- croix laser (orange) décalée -->
  <g stroke="#ff8a00" stroke-width="4" stroke-linecap="round">
    <line x1="40" y1="62" x2="96" y2="62"/>
    <line x1="68" y1="34" x2="68" y2="90"/>
  </g>
  <!-- cotes dX / dY -->
  <g stroke="#2f3540" stroke-width="1.5">
    <line x1="48" y1="8" x2="48" y2="14"/><line x1="68" y1="8" x2="68" y2="14"/>
    <line x1="48" y1="11" x2="68" y2="11"/>
    <line x1="102" y1="46" x2="108" y2="46"/><line x1="102" y1="62" x2="108" y2="62"/>
    <line x1="105" y1="46" x2="105" y2="62"/>
  </g>
  <g font-family="sans-serif" font-size="11" fill="#2f3540">
    <text x="52" y="10">dX</text>
    <text x="112" y="58">dY</text>
    <text x="126" y="30">croix fraisée (broche)</text>
    <text x="126" y="48" fill="#ff8a00">croix laser (T100)</text>
    <text x="126" y="74">écart = erreur d'offset</text>
