<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 120">
  <!-- Gravure photo : une image (degrade) transformee en trame de points. -->
  <!-- photo source : 4 bandes de gris croissant -->
  <g fill="#2f3540">
    <rect x="16" y="22" width="22" height="76" opacity="0.15"/>
    <rect x="38" y="22" width="22" height="76" opacity="0.35"/>
    <rect x="60" y="22" width="22" height="76" opacity="0.60"/>
    <rect x="82" y="22" width="22" height="76" opacity="0.85"/>
  </g>
  <rect x="16" y="22" width="88" height="76" fill="none" stroke="#2f3540" stroke-width="2"/>
  <!-- fleche : trame -->
  <text x="126" y="52" font-family="sans-serif" font-size="9.5" font-weight="bold" fill="#ff8a00" text-anchor="middle">trame</text>
  <line x1="112" y1="60" x2="140" y2="60" stroke="#ff8a00" stroke-width="3"/>
  <path d="M140 60 l-9 -5 v10 z" fill="#ff8a00"/>
  <!-- trame de points : diametre croissant de gauche a droite -->
  <g fill="#2f3540">
    <circle cx="160" cy="32" r="1.4"/><circle cx="160" cy="54" r="1.4"/><circle cx="160" cy="76" r="1.4"/><circle cx="160" cy="98" r="1.4"/>
    <circle cx="192" cy="32" r="2.4"/><circle cx="192" cy="54" r="2.4"/><circle cx="192" cy="76" r="2.4"/><circle cx="192" cy="98" r="2.4"/>
    <circle cx="224" cy="32" r="3.4"/><circle cx="224" cy="54" r="3.4"/><circle cx="224" cy="76" r="3.4"/><circle cx="224" cy="98" r="3.4"/>
    <circle cx="256" cy="32" r="4.4"/><circle cx="256" cy="54" r="4.4"/><circle cx="256" cy="76" r="4.4"/><circle cx="256" cy="98" r="4.4"/>
    <circle cx="286" cy="32" r="5.4"/><circle cx="286" cy="54" r="5.4"/><circle cx="286" cy="76" r="5.4"/><circle cx="286" cy="98" r="5.4"/>
  </g>
</svg>
