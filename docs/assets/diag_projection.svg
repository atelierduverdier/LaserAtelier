<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 100">
  <!-- motif 2D plat au-dessus -->
  <g stroke="#ff8a00" stroke-width="2.5" stroke-linecap="round">
    <line x1="46" y1="16" x2="98" y2="16"/>
    <line x1="46" y1="24" x2="98" y2="24"/>
    <line x1="46" y1="32" x2="98" y2="32"/>
  </g>
  <!-- flèches de projection verticales -->
  <g stroke="#2f3540" stroke-width="1.5" fill="none">
    <line x1="56" y1="38" x2="56" y2="54"/><polyline points="52,50 56,55 60,50"/>
    <line x1="72" y1="38" x2="72" y2="50"/><polyline points="68,46 72,51 76,46"/>
    <line x1="88" y1="38" x2="88" y2="54"/><polyline points="84,50 88,55 92,50"/>
  </g>
  <!-- surface courbe + motif épousant la courbe -->
  <path d="M30 88 Q72 48 114 88" fill="none" stroke="#2f3540" stroke-width="3"/>
  <g stroke="#ff8a00" stroke-width="2.5" fill="none" stroke-linecap="round">
