<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 100">
  <!-- 3 lignes en coin : trait de plus en plus marqué vers la droite -->
  <g fill="#ff8a00">
    <polygon points="46,18 150,15 150,21 46,19"/>
    <polygon points="46,40 150,36 150,44 46,42"/>
    <polygon points="46,62 150,56 150,68 46,64"/>
  </g>
  <g font-family="sans-serif" font-size="10" fill="#2f3540">
    <text x="14" y="22">F1500</text>
    <text x="14" y="44">F800</text>
    <text x="14" y="66">F300</text>
  </g>
  <!-- axe puissance avec graduations -->
  <g stroke="#2f3540" stroke-width="1.5">
    <line x1="46" y1="80" x2="150" y2="80"/>
    <line x1="46" y1="77" x2="46" y2="83"/>
    <line x1="98" y1="77" x2="98" y2="83"/>
    <line x1="150" y1="77" x2="150" y2="83"/>
  </g>
  <g font-family="sans-serif" font-size="10" fill="#2f3540">
    <text x="40" y="95">S0</text>
    <text x="86" y="95">S500</text>
    <text x="136" y="95">S1000</text>
  </g>
  <g font-family="sans-serif" font-size="11" fill="#2f3540">
    <text x="160" y="30">une ligne =</text>
    <text x="160" y="44">une vitesse F</text>
    <text x="160" y="66" fill="#ff8a00">la puissance monte</text>
    <text x="160" y="80" fill="#ff8a00">le long de la ligne</text>
  </g>
</svg>
